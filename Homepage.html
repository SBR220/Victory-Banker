<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory Banker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #ffffff;
            --soft-grad: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            --accent-primary: #4f46e5;
            --accent-secondary: #06b6d4;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--soft-grad);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SMOOTH BACKGROUND EFFECT --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 25px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--accent-primary);
            letter-spacing: -0.5px;
        }

        /* --- HERO SECTION --- */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 5%;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 25px;
            background: linear-gradient(to right, #1e293b, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 500px;
        }

        .hero-img-container {
            position: relative;
            border-radius: 40px;
            padding: 15px;
            background: white;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.1);
        }

        .hero-img-container img {
            width: 100%;
            border-radius: 30px;
            display: block;
        }

        /* --- 3D BUTTON MENU --- */
        .button-tray {
            display: flex;
            gap: 25px;
            justify-content: center;
            padding: 60px 5%;
            flex-wrap: wrap;
        }

        .btn-3d {
            padding: 22px 45px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: 0.1s;
            color: white;
            position: relative;
        }

        /* Logic for Light Mode 3D effect */
        .btn-calc { background: #4f46e5; border-bottom: 6px solid #3730a3; }
        .btn-todo { background: #0ea5e9; border-bottom: 6px solid #0369a1; }
        .btn-quiz { background: #10b981; border-bottom: 6px solid #065f46; }

        .btn-3d:hover {
            filter: brightness(1.05);
            transform: translateY(-2px);
        }

        .btn-3d:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-bottom: 6px;
        }

        /* --- FOOTER --- */
        footer {
            padding: 60px 0;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: 40px;
            background: #fff;
        }

        .bot-tag {
            display: inline-block;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(to right, var(--accent-primary), var(--accent-secondary)) border-box;
            border: 10px solid transparent;
            padding: 10px 25px;
            border-radius: 100px;
            font-weight: 1500;
            color: var(--text-dark);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; text-align: center; padding-top: 40px; }
            .hero-content h1 { font-size: 2.8rem; }
            .hero-content p { margin: 0 auto 40px; }
            .button-tray { flex-direction: column; width: 100%; max-width: 400px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Victory Banker ✌🏻</div>
        <div style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted);">
            2026 PREP SUITE
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1>Your Future in Banking Starts Today.</h1>
            <p>A streamlined educational workspace designed for speed, logical mastery, and consistent practice.</p>
            <div style="color: var(--accent-primary); font-weight: 700;">#TargetRBI2026 #ExamSuccess</div>
        </div>
        <div class="hero-img-container">
            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=800" alt="Banking aspirants studying">
        </div>
    </div>

    <div class="button-tray">
        <button class="btn-3d btn-calc">Calculation Master 🔥</button>
        <button class="btn-3d btn-todo">My To-Do List 🗓️</button>
        <button class="btn-3d btn-quiz">Practice Quiz ⏳</button>
    </div>

    <footer>
        <div class="bot-tag">Created and Designed by Telegram <b>@I_SR_bot</b></div>
        <p style="margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
            Professional Study Interface &copy; 2026
        </p>
    </footer>

</body>
</html>
